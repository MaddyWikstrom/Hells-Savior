<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hells Savior - Official website of the SoundCloud rapper. Listen to latest tracks, buy merchandise, and stay updated.">
    <meta name="keywords" content="Hells Savior, rapper, SoundCloud, hip hop, music, merchandise, 777">
    <title>Hells Savior - Official Website</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    
    <!-- CSS -->
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/password.css">
    <link rel="stylesheet" href="src/css/animations.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Metal+Mania&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Shopify Buy Button SDK -->
    <script src="https://sdks.shopifycdn.com/buy-button/latest/buy-button-storefront.min.js"></script>
    
    <!-- Site Configuration -->
    <script src="config/site-config.js"></script>
</head>
<body>
    <!-- Password Screen -->
    <div id="password-screen" class="password-screen">
        <div class="password-container">
            <div class="password-form">
                <input type="password" id="password-input" placeholder="Password" maxlength="4">
                <button type="button" id="password-submit">Enter</button>
            </div>
            <div id="password-error" class="password-error" style="display: none;">
                Incorrect password. Try again.
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="main-content" class="main-content">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logos-center">
                    <div class="logo-grid nav-logos">
                        <div class="small-logo-container">
                            <img src="assets/images/logos/bat.png" alt="Bat" class="small-logo bat-logo">
                        </div>
                        <div class="small-logo-container">
                            <img src="assets/images/logos/cowboy_hat.png" alt="Hat" class="small-logo hat-logo">
                        </div>
                    </div>
                    <div class="nav-center-logo">
                        <img src="assets/images/logos/scaled-up.png" alt="HELLSSAVIOR" class="nav-main-logo">
                    </div>
                    <div class="logo-grid nav-logos">
                        <div class="small-logo-container">
                            <img src="assets/images/logos/skull_crown.png" alt="Skull" class="small-logo skull-logo">
                        </div>
                        <div class="small-logo-container">
                            <img src="assets/images/logos/star.png" alt="Star" class="small-logo star-logo">
                        </div>
                    </div>
                </div>
                <div class="nav-menu nav-menu-right">
                    <a href="#music" class="nav-link">Music</a>
                    <a href="#merch" class="nav-link">Merch</a>
                    <a href="#contact" class="nav-link">Contact</a>
                </div>
                <div class="nav-toggle" id="mobile-menu">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </div>
        </nav>

        <!-- Hero Section -->
        <section id="home" class="hero">
            <video class="bg-video" autoplay muted loop playsinline>
                <source src="assets/background-video.mkv" type="video/x-matroska">
                Your browser does not support the video tag.
            </video>

            <div class="overlay"></div>

            <div class="logo-glass"></div>

            <div class="hero-content">
                <div class="hero-buttons">
                    <a href="#merch" class="hero-btn merch-btn">MERCH</a>
                    <a href="https://open.spotify.com/artist/6ymhBvJpIxbmAzskeuLHOm" target="_blank" class="hero-btn spotify-btn">SPOTIFY</a>
                </div>
            </div>
        </section>

        <!-- Music Section -->
        <section id="music" class="music-section">
            <div class="container">
                <div class="soundcloud-link">
                    <a href="https://soundcloud.com/hellssavior" target="_blank" class="btn btn-soundcloud">
                        <i class="fab fa-soundcloud"></i>
                        SoundCloud
                    </a>
                </div>
            </div>
        </section>

        <!-- Merchandise Section -->
        <section id="merch" class="merch-section">
            <div class="container">
                <h2 class="section-title">
                    <span class="title-icon">☠</span>
                    Official Merchandise
                    <span class="title-icon">☠</span>
                </h2>
                <div class="merch-grid" id="shopify-products">
                    <!-- Shopify products will be loaded here -->
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="contact-section">
            <div class="container">
                <div class="social-links">
                    <a href="https://soundcloud.com/hellssavior" target="_blank" class="social-link">
                        <i class="fab fa-soundcloud"></i>
                    </a>
                    <a href="https://instagram.com/hellssavior" target="_blank" class="social-link">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://twitter.com/hellssavior" target="_blank" class="social-link">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="https://youtube.com/@hellssavior" target="_blank" class="social-link">
                        <i class="fab fa-youtube"></i>
                    </a>
                </div>
            </div>
        </section>

    </div>

    <!-- JavaScript -->
    <script src="src/js/password.js"></script>
    <script src="src/js/main.js"></script>
    <script src="src/js/animations.js"></script>
    <script src="src/js/shopify.js"></script>
</body>
</html>
